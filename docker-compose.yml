services:
  db:
    image: postgres:16-alpine
    ports:
      - "21002:5432"
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    ports:
      - "21000:21000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    environment:
      - NODE_ENV=development

  backend:
    build:
      context: ./backend
    ports:
      - "21001:21001"
    volumes:
      - ./backend/src:/app/src
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://app:secret@db:5432/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
