services:
  sakra-api:
    build: ./backend
    restart: always
    expose:
      - "8000"
    depends_on:
      sakra-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@sakra-db:5432/${POSTGRES_DB}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      UPLOAD_DIR: /app/uploads
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - dokploy-network

  frontend:
    build: ./frontend
    restart: always
    expose:
      - "80"
    depends_on:
      - sakra-api
    networks:
      - dokploy-network

  sakra-db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dokploy-network

volumes:
  postgres_data:
  uploads_data:

networks:
  dokploy-network:
    external: true
